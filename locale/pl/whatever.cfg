[mod-setting-description]
igrys-enhance-modded-science-packs=Włącz, aby uzyskać bogatsze wrażenia. Próbuje sprawić, by maszyna wzmacniająca naukę działała z modyfikowanymi pakietami naukowymi. Może to powodować pewne problemy z innymi modami, więc zachowaj ostrożność.

[item-description]
igrys-science-enhancer-machine=Tworzy pakiety naukowe 2 razy wydajniej, ale do działania wymaga [fluid=igrys-magic-fluid].
igrys-glass-space-rocket=Szklane rakiety wymagają mniej części rakietowych do wystrzelenia, ale potrzebują również [item=igrys-glass].
igrys-copper-plate-machine=Tworzy [item=copper-plate] z powietrza, dzięki składowi atmosfery [planet=igrys], ale działa tylko w nocy.
igrys-magic-pumpjack=Wymaga [fluid=water], ale jest bardziej wydajna i może wydobywać [fluid=igrys-magic-fluid].

